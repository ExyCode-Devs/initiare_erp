services:
  web:
    container_name: ${APP_CONTAINER_NAME:-axiom-prime}
    image: ${APP_IMAGE:-axiom-prime:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      PORT: ${APP_PORT:-3000}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.axiom-prime.rule=Host(`${TRAEFIK_HOST:?set_TRAEFIK_HOST}`)"
      - "traefik.http.routers.axiom-prime.entrypoints=websecure"
      - "traefik.http.routers.axiom-prime.tls=true"
      - "traefik.http.routers.axiom-prime.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.axiom-prime.service=axiom-prime"
      - "traefik.http.services.axiom-prime.loadbalancer.server.port=${APP_PORT:-3000}"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.middlewares.axiom-prime-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.axiom-prime-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.axiom-prime-sec.headers.stsPreload=true"
      - "traefik.http.middlewares.axiom-prime-sec.headers.contentSecurityPolicy=upgrade-insecure-requests"
      - "traefik.http.middlewares.axiom-prime-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.axiom-prime-sec.headers.browserXssFilter=true"
      - "traefik.http.middlewares.axiom-prime-sec.headers.frameDeny=true"
      - "traefik.http.routers.axiom-prime.middlewares=axiom-prime-sec"
      - "traefik.http.routers.axiom-prime-http.rule=Host(`${TRAEFIK_HOST:?set_TRAEFIK_HOST}`)"
      - "traefik.http.routers.axiom-prime-http.entrypoints=web"
      - "traefik.http.routers.axiom-prime-http.service=axiom-prime"
      - "traefik.http.routers.axiom-prime-http.middlewares=axiom-prime-https-redirect,axiom-prime-sec"
      - "traefik.http.middlewares.axiom-prime-https-redirect.redirectscheme.scheme=https"
    networks:
      - proxy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${APP_PORT:-3000}/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
