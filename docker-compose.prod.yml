services:
  web:
    container_name: ${WEB_CONTAINER_NAME:-axiom-prime-web}
    image: ${WEB_IMAGE:-axiom-prime-web:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: ${HOST:-0.0.0.0}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      PORT: ${WEB_PORT:-3000}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.axiom-prime-web.rule=Host(`${TRAEFIK_HOST:?set_TRAEFIK_HOST}`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.axiom-prime-web.entrypoints=websecure"
      - "traefik.http.routers.axiom-prime-web.tls=true"
      - "traefik.http.routers.axiom-prime-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.axiom-prime-web.service=axiom-prime-web"
      - "traefik.http.services.axiom-prime-web.loadbalancer.server.port=${WEB_PORT:-3000}"
      - "traefik.http.routers.axiom-prime-web-http.rule=Host(`${TRAEFIK_HOST:?set_TRAEFIK_HOST}`) && !PathPrefix(`/api`)"
      - "traefik.http.routers.axiom-prime-web-http.entrypoints=web"
      - "traefik.http.routers.axiom-prime-web-http.service=axiom-prime-web"
      - "traefik.http.middlewares.axiom-prime-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.stsPreload=true"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.contentSecurityPolicy=upgrade-insecure-requests"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.browserXssFilter=true"
      - "traefik.http.middlewares.axiom-prime-web-sec.headers.frameDeny=true"
      - "traefik.http.routers.axiom-prime-web.middlewares=axiom-prime-web-sec"
      - "traefik.http.routers.axiom-prime-web-http.middlewares=axiom-prime-https-redirect,axiom-prime-web-sec"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
    networks:
      - app
      - proxy
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${WEB_PORT:-3000}/login').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    container_name: ${API_CONTAINER_NAME:-axiom-prime-api}
    image: ${API_IMAGE:-axiom-prime-api:latest}
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://veridia:veridia@postgres:5432/axiom_prime?schema=public}
      JWT_SECRET: ${JWT_SECRET:?set_JWT_SECRET}
      APP_ORIGIN: ${APP_ORIGIN:?set_APP_ORIGIN}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@veridia.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      SEED_COMPANY_NAME: ${SEED_COMPANY_NAME:-Acme Holdings}
      SEED_COMPANY_DOMAIN: ${SEED_COMPANY_DOMAIN:?set_SEED_COMPANY_DOMAIN}
      LOG_LEVEL: ${API_LOG_LEVEL:-info}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.axiom-prime-api.rule=Host(`${TRAEFIK_HOST:?set_TRAEFIK_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.axiom-prime-api.priority=100"
      - "traefik.http.routers.axiom-prime-api.entrypoints=websecure"
      - "traefik.http.routers.axiom-prime-api.tls=true"
      - "traefik.http.routers.axiom-prime-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.axiom-prime-api.service=axiom-prime-api"
      - "traefik.http.services.axiom-prime-api.loadbalancer.server.port=${API_PORT:-4000}"
      - "traefik.http.routers.axiom-prime-api-http.rule=Host(`${TRAEFIK_HOST:?set_TRAEFIK_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.axiom-prime-api-http.priority=100"
      - "traefik.http.routers.axiom-prime-api-http.entrypoints=web"
      - "traefik.http.routers.axiom-prime-api-http.service=axiom-prime-api"
      - "traefik.http.middlewares.axiom-prime-api-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.axiom-prime-api-sec.headers.frameDeny=true"
      - "traefik.http.routers.axiom-prime-api.middlewares=axiom-prime-api-sec"
      - "traefik.http.routers.axiom-prime-api-http.middlewares=axiom-prime-https-redirect,axiom-prime-api-sec"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
    networks:
      - app
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${API_PORT:-4000}/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    container_name: ${DB_CONTAINER_NAME:-axiom-prime-postgres}
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axiom_prime}
      POSTGRES_USER: ${POSTGRES_USER:-veridia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veridia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veridia} -d ${POSTGRES_DB:-axiom_prime}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
