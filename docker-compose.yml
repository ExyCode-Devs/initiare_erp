services:
  web:
    container_name: ${WEB_CONTAINER_NAME:-axiom-prime-web-dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-4000}/api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      HOSTNAME: 0.0.0.0
      PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    container_name: ${API_CONTAINER_NAME:-axiom-prime-api-dev}
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://veridia:veridia@postgres:5432/axiom_prime?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret-before-production-123456}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:${WEB_PORT:-3000}}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@veridia.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      SEED_COMPANY_NAME: ${SEED_COMPANY_NAME:-Acme Holdings}
      SEED_COMPANY_DOMAIN: ${SEED_COMPANY_DOMAIN:-localhost:${WEB_PORT:-3000}}
      LOG_LEVEL: ${API_LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${API_PORT:-4000}/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    container_name: ${DB_CONTAINER_NAME:-axiom-prime-postgres-dev}
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axiom_prime}
      POSTGRES_USER: ${POSTGRES_USER:-veridia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veridia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veridia} -d ${POSTGRES_DB:-axiom_prime}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
