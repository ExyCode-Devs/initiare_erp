name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag or commit SHA to deploy"
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: true

env:
  REMOTE_APP_DIR: /source/initiare_erp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    env:
      WEB_IMAGE: ${{ secrets.WEB_IMAGE }}
      API_IMAGE: ${{ secrets.API_IMAGE }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Validate required secrets and vars
        run: |
          test -n "${{ secrets.WEB_IMAGE }}"
          test -n "${{ secrets.API_IMAGE }}"
          test -n "${{ secrets.DOCKERHUB_USERNAME }}"
          test -n "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    env:
      REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
      REMOTE_PORT: ${{ secrets.HOSTINGER_PORT || '22' }}
      REMOTE_USER: ${{ secrets.HOSTINGER_USER }}
      WEB_IMAGE: ${{ secrets.WEB_IMAGE }}
      API_IMAGE: ${{ secrets.API_IMAGE }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Validate SSH secrets
        run: |
          test -n "$REMOTE_HOST"
          test -n "$REMOTE_USER"
          test -n "${{ secrets.HOSTINGER_SSH_KEY }}"

      - name: Ensure remote directory exists
        uses: appleboy/ssh-action@v1.2.1
        env:
          REMOTE_APP_DIR: ${{ env.REMOTE_APP_DIR }}
        with:
          host: ${{ env.REMOTE_HOST }}
          username: ${{ env.REMOTE_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ env.REMOTE_PORT }}
          envs: REMOTE_APP_DIR
          timeout: 120s
          command_timeout: 30s
          sync: true
          script: |
            set -e
            mkdir -p "$REMOTE_APP_DIR/deploy/hostinger"

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.REMOTE_HOST }}
          username: ${{ env.REMOTE_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ env.REMOTE_PORT }}
          timeout: 120s
          command_timeout: 60s
          overwrite: true
          source: "docker-compose.prod.yml,deploy/hostinger/deploy.sh"
          target: "${{ env.REMOTE_APP_DIR }}"
          strip_components: 0

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.1
        env:
          REMOTE_APP_DIR: ${{ env.REMOTE_APP_DIR }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          API_IMAGE: ${{ env.API_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ env.REMOTE_HOST }}
          username: ${{ env.REMOTE_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ env.REMOTE_PORT }}
          envs: REMOTE_APP_DIR,WEB_IMAGE,API_IMAGE,IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          timeout: 120s
          command_timeout: 60m
          sync: true
          script: |
            set -e
            cd "$REMOTE_APP_DIR"
            chmod +x deploy/hostinger/deploy.sh

            tries=0
            until [ "$tries" -ge 3 ]; do
              tries=$((tries + 1))
              if APP_DIR="$REMOTE_APP_DIR" COMPOSE_FILE="docker-compose.prod.yml" \
                WEB_IMAGE="$WEB_IMAGE" API_IMAGE="$API_IMAGE" IMAGE_TAG="$IMAGE_TAG" \
                DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME" DOCKERHUB_TOKEN="$DOCKERHUB_TOKEN" \
                bash deploy/hostinger/deploy.sh; then
                exit 0
              fi

              if [ "$tries" -ge 3 ]; then
                echo "deploy failed after $tries attempts"
                exit 1
              fi

              echo "deploy attempt $tries failed, retrying in 20s"
              sleep 20
            done
