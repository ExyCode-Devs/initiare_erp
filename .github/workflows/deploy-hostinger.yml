name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag or commit SHA to deploy"
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
      REMOTE_PORT: ${{ secrets.HOSTINGER_PORT || '22' }}
      REMOTE_USER: ${{ secrets.HOSTINGER_USER }}
      REMOTE_APP_DIR: /source/initiare_erp
      WEB_IMAGE: ${{ secrets.WEB_IMAGE }}
      API_IMAGE: ${{ secrets.API_IMAGE }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install api dependencies
        run: npm --prefix api ci

      - name: Build application
        run: npm run build

      - name: Validate required secrets and vars
        run: |
          test -n "$REMOTE_HOST"
          test -n "$REMOTE_USER"
          test -n "$WEB_IMAGE"
          test -n "$API_IMAGE"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest

      - name: Configure SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          touch ~/.ssh/known_hosts
          ssh-keyscan -H -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts || true

      - name: Ensure remote directory exists
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/hostinger_key -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "mkdir -p '$REMOTE_APP_DIR'"

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.npm-cache/' \
            --exclude '.output/' \
            --exclude 'dist/' \
            --exclude '.wrangler/' \
            --exclude '.env' \
            --exclude '.env.production' \
            --exclude '.env.production.local' \
            -e "ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/hostinger_key -p $REMOTE_PORT" \
            ./ "$REMOTE_USER@$REMOTE_HOST:$REMOTE_APP_DIR/"

      - name: Run remote deploy
        run: |
          printf -v REMOTE_WEB_IMAGE '%q' "$WEB_IMAGE"
          printf -v REMOTE_API_IMAGE '%q' "$API_IMAGE"
          printf -v REMOTE_IMAGE_TAG '%q' "$IMAGE_TAG"
          printf -v REMOTE_DOCKERHUB_USERNAME '%q' "$DOCKERHUB_USERNAME"
          printf -v REMOTE_DOCKERHUB_TOKEN '%q' "$DOCKERHUB_TOKEN"

          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/hostinger_key -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "cd '$REMOTE_APP_DIR' && chmod +x deploy/hostinger/deploy.sh && \
            APP_DIR='$REMOTE_APP_DIR' COMPOSE_FILE='docker-compose.prod.yml' \
            WEB_IMAGE=$REMOTE_WEB_IMAGE API_IMAGE=$REMOTE_API_IMAGE IMAGE_TAG=$REMOTE_IMAGE_TAG \
            DOCKERHUB_USERNAME=$REMOTE_DOCKERHUB_USERNAME DOCKERHUB_TOKEN=$REMOTE_DOCKERHUB_TOKEN \
            bash deploy/hostinger/deploy.sh"
