name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag or commit SHA to deploy"
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      REMOTE_HOST: ${{ secrets.HOSTINGER_HOST }}
      REMOTE_PORT: ${{ secrets.HOSTINGER_PORT || '22' }}
      REMOTE_USER: ${{ secrets.HOSTINGER_USER }}
      REMOTE_APP_DIR: /source/initiare_erp

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install api dependencies
        run: npm --prefix api ci

      - name: Build application
        run: npm run build

      - name: Build web Docker image
        run: docker build -t initiare_erp-web:ci .

      - name: Build api Docker image
        run: docker build -t initiare_erp-api:ci ./api

      - name: Validate required secrets
        run: |
          test -n "$REMOTE_HOST"
          test -n "$REMOTE_USER"

      - name: Configure SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh -i ~/.ssh/hostinger_key -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "mkdir -p '$REMOTE_APP_DIR'"

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.npm-cache/' \
            --exclude '.output/' \
            --exclude 'dist/' \
            --exclude '.wrangler/' \
            --exclude '.env' \
            --exclude '.env.production' \
            --exclude '.env.production.local' \
            -e "ssh -i ~/.ssh/hostinger_key -p $REMOTE_PORT" \
            ./ "$REMOTE_USER@$REMOTE_HOST:$REMOTE_APP_DIR/"

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/hostinger_key -p "$REMOTE_PORT" "$REMOTE_USER@$REMOTE_HOST" \
            "cd '$REMOTE_APP_DIR' && chmod +x deploy/hostinger/deploy.sh && \
            APP_DIR='$REMOTE_APP_DIR' COMPOSE_FILE='docker-compose.prod.yml' bash deploy/hostinger/deploy.sh"
