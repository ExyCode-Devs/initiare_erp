name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            api/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install api dependencies
        run: npm --prefix api ci

      - name: Build application
        run: npm run build

      - name: Validate production compose
        env:
          WEB_IMAGE: docker.io/exycode/initiare-erp
          API_IMAGE: docker.io/exycode/initiare-erp-api
          IMAGE_TAG: ci
        run: docker compose --env-file deploy/hostinger/.env.production.example -f docker-compose.prod.yml config

      - name: Build web Docker image
        run: docker build -t initiare_erp-web:ci .

      - name: Build api Docker image
        run: docker build -t initiare_erp-api:ci ./api
